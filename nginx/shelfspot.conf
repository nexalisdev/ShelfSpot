# ShelfSpot — Nginx reverse proxy configuration
#
# Deployment:
#   Linux  →  copy to /etc/nginx/sites-available/shelfspot
#             then: sudo ln -s /etc/nginx/sites-available/shelfspot /etc/nginx/sites-enabled/
#             then: sudo nginx -t && sudo systemctl reload nginx
#
#   Or drop into /etc/nginx/conf.d/shelfspot.conf (no symlink needed on that layout).
#
# DNS: add A records pointing shelf.lan and api.shelf.lan to your homelab IP.
#      Quick test on a single machine: add to /etc/hosts (Linux/Mac) or
#      C:\Windows\System32\drivers\etc\hosts (Windows):
#        192.168.1.10  shelf.lan
#        192.168.1.10  api.shelf.lan
#
# CLI: set SHELFSPOT_URL=http://api.shelf.lan
# Frontend env (docker-compose): NEXT_PUBLIC_BACKEND_URL=http://backend:8082  ← keep internal

# ── Frontend ──────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name shelf.lan;

    # Allow larger payloads (images, bulk imports)
    client_max_body_size 20M;

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    location / {
        proxy_pass         http://127.0.0.1:8083;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR / future features)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Backend API ───────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name api.shelf.lan;

    client_max_body_size 20M;

    # CORS — allow the frontend origin to call the API directly if needed
    add_header Access-Control-Allow-Origin  "http://shelf.lan" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Handle pre-flight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }
}
