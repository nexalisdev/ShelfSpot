services:
  db:
    image: postgres:15-alpine
    container_name: shelfspot_db
    profiles: ["backend", "full"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-shelfspot}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shelfspot_backend
    profiles: ["backend", "full"]
    ports:
      - "${BACKEND_PORT:-8082}:8082"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8082}
    container_name: shelfspot_frontend
    profiles: ["frontend", "full"]
    ports:
      - "${FRONTEND_PORT:-8083}:8083"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  db_data:
